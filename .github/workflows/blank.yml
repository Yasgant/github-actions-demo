name: Greeting from Yang Yiliu
on: push

jobs:
        my-job:
                name: My job
                runs-on: ubuntu-latest
                steps:
                        - name: Print a greeting
                          env:
                                  MY_VAR: Hi there! My name is
                                  FIRST_NAME: Yang
                                  MIDDLE_NAME: Yi
                                  LAST_NAME: Liu
                                  run: |
                                          echo $MY_VAR $FIRST_NAME $MIDDLE_NAME $LAST_NAME.
